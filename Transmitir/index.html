<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transmitir Tela</title>
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #121212; color: #fff; font-family: sans-serif; }
  button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-bottom: 20px; }
  video { border: 2px solid #fff; max-width: 90%; max-height: 70vh; }
  .resizable { resize: both; overflow: hidden; }
</style>
</head>
<body>

<button id="btnTransmitir">Transmitir Tela</button>
<div class="resizable">
  <video id="videoTela" autoplay playsinline></video>
</div>

<script src="Node.js"></script>
<script>
const socket = io();
const video = document.getElementById("videoTela");
const btn = document.getElementById("btnTransmitir");
let pc;

btn.addEventListener("click", async () => {
  pc = new RTCPeerConnection();

  pc.ontrack = event => {
    video.srcObject = event.streams[0];
  };

  pc.onicecandidate = event => {
    if(event.candidate) socket.emit("ice-candidate", event.candidate);
  };

  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
    stream.getTracks().forEach(track => pc.addTrack(track, stream));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("offer", offer);
  } catch (err) {
    alert("Erro ao transmitir tela: " + err);
  }
});

socket.on("offer", async offer => {
  if(!pc) pc = new RTCPeerConnection();
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit("answer", answer);
});

socket.on("answer", async answer => {
  await pc.setRemoteDescription(answer);
});

socket.on("ice-candidate", async candidate => {
  try { await pc.addIceCandidate(candidate); } catch(e){}
});
</script>

</body>
</html>
